[pytest]
;addopts = -vs --alluredir ./report/temp -p no:warnings --clean-alluredir
;
;testpaths = ./testcase/

filterwarnings =
    error
    ignore::UserWarning

python_files = test_*.py

python_classes = Test*

python_functions = test

# ── 多维度标签体系 ───────────────────────────────────────────────
# 优先级维度：按业务重要度分级
markers =
    p0: 核心冒烟用例，必须全部通过，用于 CI 门禁
    p1: 高优先级回归用例，每次发版必跑
    p2: 普通回归用例，全量回归时执行
    p3: 低优先级场景，按需执行

    # 测试类型维度
    smoke: 冒烟测试
    regression: 回归测试
    sanity: 健全性检查

    # 模块维度（与 Allure feature 对应）
    user: 用户管理模块
    product: 商品管理模块
    order: 订单模块
    business: 业务场景端到端

    # 执行环境维度
    dev: 仅限开发环境
    staging: 仅限预发布环境
    prod: 可在生产环境执行（只读）

    # 特殊场景
    security: 安全测试（注入/越权/未授权）
    performance: 性能测试标记

# ── 并发执行（需安装 pytest-xdist）────────────────────────────────
# 按文件分发，保证同一 YAML 文件内的用例在同一个 worker 顺序执行
# 生产使用时取消下行注释：
;addopts = -n auto --dist=loadfile
